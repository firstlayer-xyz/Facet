name: Guards

on:
  pull_request:
    # Include labeled/unlabeled so adding the workflow-change-approved
    # label fires a fresh event with the current label set (reruns reuse
    # the original event payload, so a post-open label add wouldn't
    # propagate through `gh run rerun`).
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  workflow-diff-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Run diff-inspection script
        env:
          BASE_REF: origin/${{ github.base_ref }}
          HEAD_REF: HEAD
          PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          # Convert the JSON array of label names to newline-separated for the script.
          # jq is preinstalled on ubuntu-latest. Empty array yields empty PR_LABELS.
          PR_LABELS=$(printf '%s' "$PR_LABELS_JSON" | jq -r '.[]' || true)
          export PR_LABELS
          chmod +x .github/scripts/check-workflow-diff.sh
          .github/scripts/check-workflow-diff.sh
