name: Profile Windows

# Diagnostic workflow — measures where time goes in `make test` on
# Windows so we can stop guessing about the 4x slowdown vs Linux.
# Triggers only on workflow_dispatch (run manually from the Actions UI
# when you want fresh data). Reuses the same toolchain caches as ci.yml
# so it doesn't double-pay for the build setup.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  profile:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Disable Windows Defender real-time scanning
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install ninja
        run: choco install ninja --no-progress -y

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v5
        with:
          path: .go-toolchain
          key: go-toolchain-Windows-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/setup-go.sh

      - name: Install Wails
        shell: bash
        run: .go-toolchain/bin/go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Cache manifold + third-party builds
        id: cache-manifold
        uses: actions/cache@v5
        with:
          path: |
            third_party
            pkg/manifold/cxx/build-*
          key: manifold-${{ runner.os }}-${{ hashFiles('scripts/_third-party-versions.sh', 'scripts/build-manifold.sh', 'pkg/manifold/cxx/CMakeLists.txt', 'pkg/manifold/cxx/include/**', 'pkg/manifold/cxx/src/**') }}

      - name: Disable Strawberry Perl ccache
        shell: bash
        run: |
          if [ -f "/c/Strawberry/c/bin/ccache.exe" ]; then
            mv "/c/Strawberry/c/bin/ccache.exe" "/c/Strawberry/c/bin/ccache.exe.disabled"
          fi

      - name: Build manifold
        if: steps.cache-manifold.outputs.cache-hit != 'true'
        shell: bash
        run: make manifold

      - name: Run tests with cpuprofile
        # `-cpuprofile=` can only be used with a single package per
        # invocation (output file would be overwritten). Loop over the
        # packages that have the slow cgo-using tests and capture a
        # profile per package. `-count=1` disables Go's test cache so
        # the profile reflects a real run.
        shell: bash
        run: |
          set -e
          export CC="zig cc"
          export CXX="zig c++"
          mkdir -p profiles
          for pkg in pkg/manifold pkg/fctlang/evaluator pkg/fctlang; do
            out="profiles/$(echo "$pkg" | tr / _).prof"
            bin="profiles/$(echo "$pkg" | tr / _).test.exe"
            echo "::group::profiling ./$pkg/"
            .go-toolchain/bin/go test \
              -cpuprofile="$out" \
              -o "$bin" \
              -count=1 \
              "./$pkg/" || echo "WARN: ./$pkg/ tests failed (profile still captured if produced)"
            echo "::endgroup::"
          done
          echo "=== profiles collected ==="
          ls -la profiles/

      - name: Upload profiles
        uses: actions/upload-artifact@v7
        with:
          name: windows-cpu-profiles
          path: profiles/
          retention-days: 14
          if-no-files-found: error
