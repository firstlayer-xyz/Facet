name: Build

on:
  schedule:
    - cron: '0 5 * * *'  # daily at midnight ET (5am UTC)
  push:
    tags: ['v*']  # tagged releases
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -tags=webkit2_41

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-Linux-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Install Wails
        run: .go-toolchain/bin/go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build manifold
        run: make manifold

      - name: Build Facet
        run: cd app && ~/go/bin/wails build -tags webkit2_41
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          PATH: ${{ github.workspace }}/.go-toolchain/bin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin

      - name: Package
        run: |
          mkdir -p dist
          cp app/build/bin/facet dist/Facet-linux-amd64
          chmod +x dist/Facet-linux-amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facet-linux
          path: dist/Facet-linux-amd64

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-Windows-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/setup-go.sh

      - name: Install Wails
        shell: bash
        run: .go-toolchain/bin/go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build manifold
        shell: bash
        run: make manifold

      - name: Build Facet
        shell: bash
        run: cd app && ~/go/bin/wails build
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          PATH: ${{ github.workspace }}/.go-toolchain/bin:$PATH

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/bin/facet.exe dist/Facet-windows-amd64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facet-windows
          path: dist/Facet-windows-amd64.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-macOS-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Install Wails
        run: .go-toolchain/bin/go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build manifold
        run: make manifold

      - name: Build Facet.app
        run: cd app && ~/go/bin/wails build
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          PATH: ${{ github.workspace }}/.go-toolchain/bin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin

      - name: Ad-hoc codesign
        run: codesign -s - --force --deep app/build/bin/Facet.app

      - name: Create DMG
        run: |
          mkdir -p dist
          hdiutil create -volname Facet -srcfolder app/build/bin/Facet.app -ov -format UDZO dist/Facet-macOS-arm64.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facet-macos
          path: dist/Facet-macOS-arm64.dmg

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone facetlibs
        run: git clone https://github.com/firstlayer-xyz/facetlibs facetlibs

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-Linux-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Build manifold
        run: make manifold

      - name: Run tests
        run: make test

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule'
    needs: [build-linux, build-windows, build-macos, test]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: facet-linux
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: facet-windows
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: facet-macos
          path: dist/

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Create or update nightly release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: dist/*
          body: |
            Automated nightly build from main branch.
            Built at ${{ github.event.head_commit.timestamp || 'scheduled run' }}.
