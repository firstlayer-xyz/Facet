name: Build

on:
  schedule:
    - cron: '0 5 * * *'  # daily at midnight ET (5am UTC)
  push:
    tags: ['v*']  # tagged releases
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-Linux-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Cache C++ libraries
        uses: actions/cache@v4
        with:
          path: |
            app/third_party/assimp/build-*
            app/third_party/assimp/install-*
            app/third_party/freetype/build-*
            app/third_party/freetype/install-*
          key: cpp-libs-linux-windows-${{ hashFiles('scripts/build-manifold.sh') }}

      - name: Build frontend
        run: |
          cd app/frontend
          npm install
          npm run build

      - name: Build targets
        run: |
          for target in linux-amd64 linux-arm64 windows-amd64; do
            echo "=== Building $target ==="
            make cross-build TARGET=$target
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facet-linux-windows
          path: build/bin/facet-*

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-macOS-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Cache C++ libraries
        uses: actions/cache@v4
        with:
          path: |
            app/third_party/assimp/build-*
            app/third_party/assimp/install-*
            app/third_party/freetype/build-*
            app/third_party/freetype/install-*
          key: cpp-libs-macos-${{ hashFiles('scripts/build-manifold.sh') }}

      - name: Build frontend
        run: |
          cd app/frontend
          npm install
          npm run build

      - name: Build targets
        run: |
          for target in darwin-arm64; do
            echo "=== Building $target ==="
            make cross-build TARGET=$target
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facet-macos
          path: build/bin/facet-*

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-Linux-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Build manifold
        run: make manifold

      - name: Run tests
        run: make test
        env:
          CC: zig cc
          CXX: zig c++

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule'
    needs: [build-linux-windows, build-macos, test]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux/Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: facet-linux-windows
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: facet-macos
          path: dist/

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Create or update nightly release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: dist/*
          body: |
            Automated nightly build from main branch.
            Built at ${{ github.event.head_commit.timestamp || 'scheduled run' }}.
