name: Build

on:
  schedule:
    - cron: '0 5 * * *'  # daily at midnight ET (5am UTC)
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-Linux-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Install Wails
        run: .go-toolchain/bin/go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build manifold
        run: make manifold
        env:
          CC: zig cc
          CXX: zig c++

      - name: Build Facet
        run: cd app && ~/go/bin/wails build
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          PATH: ${{ github.workspace }}/.go-toolchain/bin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin
          CC: zig cc
          CXX: zig c++

      - name: Package binary
        run: |
          mkdir -p dist
          cp app/build/bin/facet dist/Facet-linux-amd64
          chmod +x dist/Facet-linux-amd64

      - name: Package .deb
        run: |
          VERSION="0.1.0"
          PKG="facet_${VERSION}_amd64"
          mkdir -p "$PKG/DEBIAN"
          mkdir -p "$PKG/usr/bin"
          mkdir -p "$PKG/usr/share/applications"
          mkdir -p "$PKG/usr/share/icons/hicolor/256x256/apps"

          cp app/build/bin/facet "$PKG/usr/bin/facet"
          chmod +x "$PKG/usr/bin/facet"

          # Resize icon to 256x256 if convert is available, otherwise copy as-is
          if command -v convert >/dev/null 2>&1; then
            convert app/build/appicon.png -resize 256x256 "$PKG/usr/share/icons/hicolor/256x256/apps/facet.png"
          else
            cp app/build/appicon.png "$PKG/usr/share/icons/hicolor/256x256/apps/facet.png"
          fi

          cat > "$PKG/usr/share/applications/facet.desktop" << 'EOF'
          [Desktop Entry]
          Name=Facet
          Comment=Code-driven 3D modeling
          Exec=facet
          Icon=facet
          Type=Application
          Categories=Graphics;3DGraphics;Engineering;
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$PKG/usr/share/applications/facet.desktop"

          cat > "$PKG/DEBIAN/control" << EOF
          Package: facet
          Version: ${VERSION}
          Section: graphics
          Priority: optional
          Architecture: amd64
          Maintainer: First Layer <hello@firstlayer.xyz>
          Description: Code-driven 3D modeling
           Facet is a desktop CAD application where you write code to describe 3D models.
          EOF
          sed -i 's/^          //' "$PKG/DEBIAN/control"

          dpkg-deb --build "$PKG" "dist/facet_${VERSION}_amd64.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facet-linux
          path: |
            dist/Facet-linux-amd64
            dist/*.deb

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-Windows-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/setup-go.sh

      - name: Install Wails
        shell: bash
        run: .go-toolchain/bin/go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build manifold
        shell: bash
        run: make manifold

      - name: Add Go toolchain to PATH
        shell: bash
        run: echo "${{ github.workspace }}/.go-toolchain/bin" >> $GITHUB_PATH

      - name: Build Facet
        shell: bash
        run: cd app && ~/go/bin/wails build
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/bin/facet.exe dist/Facet-windows-amd64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facet-windows
          path: dist/Facet-windows-amd64.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-macOS-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Install Wails
        run: .go-toolchain/bin/go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build manifold
        run: make manifold

      - name: Build Facet.app
        run: cd app && ~/go/bin/wails build
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          PATH: ${{ github.workspace }}/.go-toolchain/bin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin

      - name: Import signing certificate
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 -d > cert.p12
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "build" build.keychain

      - name: Codesign
        run: |
          echo "=== All identities in build.keychain ==="
          security find-identity -v build.keychain
          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning build.keychain
          echo "==="
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep -o '"[^"]*"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "No signing identity found — falling back to ad-hoc"
            codesign -s - --force --deep --options runtime app/build/bin/Facet.app
          else
            echo "Signing with: $IDENTITY"
            codesign -s "$IDENTITY" --force --deep --options runtime --keychain build.keychain app/build/bin/Facet.app
          fi

      - name: Create DMG
        run: |
          mkdir -p dist
          hdiutil create -volname Facet -srcfolder app/build/bin/Facet.app -ov -format UDZO dist/Facet-macOS-arm64.dmg

      - name: Notarize
        run: |
          xcrun notarytool submit dist/Facet-macOS-arm64.dmg \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple dist/Facet-macOS-arm64.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: facet-macos
          path: dist/Facet-macOS-arm64.dmg

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone facetlibs
        run: git clone https://github.com/firstlayer-xyz/facetlibs facetlibs

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v4
        with:
          path: .go-toolchain
          key: go-toolchain-Linux-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Build manifold
        run: make manifold

      - name: Run tests
        run: make test
        env:
          CC: zig cc
          CXX: zig c++

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule'
    needs: [build-linux, build-windows, build-macos, test]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: facet-linux
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: facet-windows
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: facet-macos
          path: dist/

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Create or update nightly release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: dist/*
          body: |
            Automated nightly build from main branch.
            Built at ${{ github.event.head_commit.timestamp || 'scheduled run' }}.
