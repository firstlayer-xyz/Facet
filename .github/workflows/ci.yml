name: CI

on:
  pull_request:
    branches: [main]
  push:
    # Only fire push trigger on main + version tags. Feature branches
    # are covered by the pull_request trigger (synchronize event) once
    # a PR is open. This avoids the dual-trigger problem where one
    # push to a PR'd branch produced two workflow runs — concurrency
    # cancelled one, but cancelled jobs render as red ✗ in the PR UI
    # and look indistinguishable from real failures.
    # If you need CI on a branch before opening a PR, open a draft PR
    # or use workflow_dispatch from the Actions UI.
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 5 * * *'  # nightly at 5am UTC
  workflow_dispatch:

# Auto-cancel obsolete in-progress runs. A push to a PR branch fires both
# 'push' and 'pull_request: synchronize', producing duplicate runs for the
# same SHA. Grouping by PR number (when on a PR) or ref (when not) and
# cancel-in-progress keeps only the most recent run alive.
# Not applied to release.yml: interrupting a partial sign/notarize would
# leave artifacts in a half-signed state.
concurrency:
  # Use head_ref || ref_name so push and pull_request events on the same
  # branch share a group. github.head_ref is set for PR events (source
  # branch), github.ref_name is set for push events (the branch name).
  # Using github.ref or pull_request.number would put push and PR-sync
  # events in different groups → no cross-cancellation.
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
          # Don't persist zig's global/local cache across runs. setup-zig's
          # cache has a separate key and lifetime from the "Cache manifold +
          # third-party builds" step below, so the two desync: a run that
          # hits the manifold cache skips the C++ build and saves a near-empty
          # zig cache, which a later clean build then restores and trusts —
          # its manifest references runtime archives (compiler_rt, c++abi,
          # ubsan_rt) that aren't on disk, failing the build with "failed to
          # parse archive: FileNotFound". The heavy C++ libs stay cached via
          # the manifold step; only zig's small runtime is rebuilt per run.
          use-cache: false

      - name: Install GTK + WebKit + libc++ dev libs
        # Wails 2.x needs gtk+webkit2gtk dev headers. Ubuntu 24.04 ships
        # webkit2gtk-4.1; Wails CGO has webkit2gtk-4.0 hardcoded in
        # build-tagged source so we symlink the .pc files. libc++ is
        # also installed: our CGO build links -lc++ (zig's default C++
        # stdlib choice), and gcc's default link path doesn't have it
        # without libc++-dev/libc++abi-dev.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config libc++-dev libc++abi-dev
          PKG=/usr/lib/x86_64-linux-gnu/pkgconfig
          for n in webkit2gtk javascriptcoregtk; do
            if [ ! -f "$PKG/${n}-4.0.pc" ] && [ -f "$PKG/${n}-4.1.pc" ]; then
              sudo ln -s "${n}-4.1.pc" "$PKG/${n}-4.0.pc"
            fi
          done

      # actions/cache flakes occasionally — most often on windows-latest,
      # where the action silently fails in ~1s with no log output. A
      # missed cache is a soft failure everywhere (the gated rebuild step
      # below handles it), so we tolerate the action's own errors and
      # rebuild from source on miss. The same continue-on-error applies
      # to every cache step in this file.
      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: .go-toolchain
          key: go-toolchain-Linux-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Cache manifold + third-party builds
        # Caches the manifold/freetype/tbb source clones and built
        # libs, plus the facet_cxx glue layer build. Key invalidates when
        # the pinned versions or the build script change, or when our
        # cxx glue sources change. Skip 'Build manifold' on hit;
        # build-manifold.sh is idempotent so 'make test' re-running
        # manifold as a dep is fast.
        id: cache-manifold
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            third_party
            pkg/manifold/cxx/build-*
          key: manifold-${{ runner.os }}-${{ hashFiles('scripts/_third-party-versions.sh', 'scripts/build-manifold.sh', 'pkg/manifold/cxx/CMakeLists.txt', 'pkg/manifold/cxx/include/**', 'pkg/manifold/cxx/src/**') }}

      - name: Build manifold
        if: steps.cache-manifold.outputs.cache-hit != 'true'
        run: make manifold
        env:
          CC: zig cc
          CXX: zig c++

      - name: Run tests
        run: make test
        env:
          CC: zig cc
          CXX: zig c++

      - name: Build Facet
        run: make build
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          PATH: ${{ github.workspace }}/.go-toolchain/bin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin
          CC: zig cc
          CXX: zig c++

      # Runs ./desktop/... (HTTP server, eval/frame handlers, MCP startup) which
      # `make test` does not — it covers ./pkg/... only. Placed after Build Facet
      # so the embedded frontend/dist and wailsjs bindings already exist.
      - name: Run desktop tests
        run: make test-desktop-go
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          PATH: ${{ github.workspace }}/.go-toolchain/bin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin
          CC: zig cc
          CXX: zig c++

      - name: Package binary + .deb
        run: |
          mkdir -p dist
          cp desktop/build/bin/facet dist/Facet-linux-amd64
          chmod +x dist/Facet-linux-amd64
          tar czf dist/Facet-linux-amd64.tar.gz -C dist Facet-linux-amd64
          rm dist/Facet-linux-amd64

          VERSION="0.1.0"
          PKG="facet_${VERSION}_amd64"
          mkdir -p "$PKG/DEBIAN" "$PKG/usr/bin" "$PKG/usr/share/applications" "$PKG/usr/share/icons/hicolor/256x256/apps"

          cp desktop/build/bin/facet "$PKG/usr/bin/facet"
          chmod +x "$PKG/usr/bin/facet"

          if command -v convert >/dev/null 2>&1; then
            convert desktop/build/appicon.png -resize 256x256 "$PKG/usr/share/icons/hicolor/256x256/apps/facet.png"
          else
            cp desktop/build/appicon.png "$PKG/usr/share/icons/hicolor/256x256/apps/facet.png"
          fi

          cat > "$PKG/usr/share/applications/facet.desktop" << 'EOF'
          [Desktop Entry]
          Name=Facet
          Comment=Code-driven 3D modeling
          Exec=facet
          Icon=facet
          Type=Application
          Categories=Graphics;3DGraphics;Engineering;
          EOF
          sed -i 's/^          //' "$PKG/usr/share/applications/facet.desktop"

          cat > "$PKG/DEBIAN/control" << EOF
          Package: facet
          Version: ${VERSION}
          Section: graphics
          Priority: optional
          Architecture: amd64
          Maintainer: First Layer <hello@firstlayer.xyz>
          Description: Code-driven 3D modeling
           Facet is a desktop CAD application where you write code to describe 3D models.
          EOF
          sed -i 's/^          //' "$PKG/DEBIAN/control"

          dpkg-deb --build "$PKG" "dist/facet_${VERSION}_amd64.deb"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            dist/Facet-linux-amd64.tar.gz
            dist/facet_*.deb
          retention-days: 14
          if-no-files-found: error

  build-web:
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: '3.1.74'
      BINARYEN_VERSION: '119'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: .go-toolchain
          key: go-toolchain-Linux-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      # Fast source-only check: the wasm JS bridge must stay in sync with the
      # native cgo build (catches a shim that silently diverges from the C++
      # kernel, as Insert once did). Runs before the expensive wasm build.
      - name: Check wasm shim consistency
        run: make check-shims

      - name: Cache emsdk
        id: cache-emsdk
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/emsdk
          key: emsdk-Linux-${{ env.EMSDK_VERSION }}

      - name: Set up emsdk
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          set -e
          git clone https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          cd "$RUNNER_TEMP/emsdk"
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"

      - name: Cache binaryen
        id: cache-binaryen
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ${{ runner.temp }}/binaryen
          key: binaryen-Linux-${{ env.BINARYEN_VERSION }}

      - name: Set up binaryen (wasm-opt)
        if: steps.cache-binaryen.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/binaryen"
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            | tar xz -C "$RUNNER_TEMP/binaryen" --strip-components=1

      - name: Build wasm
        run: |
          set -e
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          export PATH="$RUNNER_TEMP/binaryen/bin:$PATH"
          make wasm

      - name: Install Playwright browsers
        run: |
          cd web/test
          npm ci
          npx playwright install --with-deps chromium

      - name: Run web tests
        run: make test-web

      - name: Upload web bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-bundle
          path: |
            web/facet.wasm
            web/facet_cxx.js
            web/facet_cxx.wasm
            web/wasm_exec.js
            web/index.html
          retention-days: 14
          if-no-files-found: error

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/frontend/package-lock.json

      # The frontend src/ imports from wailsjs/, which is generated by `wails
      # build` and gitignored. The integration tests don't need real Wails
      # bindings (the harness mocks them all at runtime), they only need the
      # paths to resolve so vite can serve the bundle. Generate minimal stub
      # files matching the import paths.
      - name: Generate wailsjs stubs
        run: bash scripts/gen-wailsjs-stubs.sh

      # actions/cache flakes occasionally — see the comment block above the
      # first cache step in this file for the rationale.
      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('desktop/frontend/package-lock.json') }}

      - name: Install frontend deps
        run: |
          cd desktop/frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Run integration tests
        run: make test-desktop

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-results
          path: |
            desktop/frontend/test-results
            desktop/frontend/playwright-report
          retention-days: 7
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Disable Windows Defender real-time scanning
        # Defender's per-file scanning adds significant overhead to
        # Windows CI runs (notably 'Run tests' which spawns short-lived
        # processes and reads many .fct/.cpp/.obj files). The runner is
        # ephemeral and we control all inputs: source from this repo,
        # pinned tool versions (zig, ninja via choco, Wails), facetlibs
        # fetched from a known git repo. Equivalent scanning isn't done
        # on Linux/macOS runners, so disabling here just brings Windows
        # in line with the existing trust model. Requires admin which
        # the github-hosted runner has.
        #
        # Best-effort: Set-MpPreference intermittently fails with a transient
        # service error (0x800106ba) on the ephemeral runner. This step is a
        # speed optimization, not a correctness input, so a flake here must not
        # fail the build — continue-on-error surfaces it without blocking.
        continue-on-error: true
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install ninja
        run: choco install ninja --no-progress -y

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
          # Don't persist zig's cache across runs — it desyncs from the
          # manifold build cache and poisons clean builds with stale
          # manifests (see the build-linux job above for the full why).
          use-cache: false

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: .go-toolchain
          key: go-toolchain-Windows-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/setup-go.sh

      - name: Cache manifold + third-party builds
        # Re-enabled after the ISA baseline fix in build-manifold.sh
        # (-march=x86-64-v2 on x86_64 targets). Earlier failures were
        # not cache corruption — hashes were byte-identical — but CPU
        # heterogeneity in the windows-latest runner pool: the cached
        # lib used native ISA instructions some runners don't support.
        id: cache-manifold
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            third_party
            pkg/manifold/cxx/build-*
          key: manifold-${{ runner.os }}-${{ hashFiles('scripts/_third-party-versions.sh', 'scripts/build-manifold.sh', 'pkg/manifold/cxx/CMakeLists.txt', 'pkg/manifold/cxx/include/**', 'pkg/manifold/cxx/src/**') }}

      - name: Disable Strawberry Perl ccache
        # windows-latest preinstalls Strawberry Perl which puts ccache.exe
        # on PATH. CMake auto-detects ccache and wraps ar/ranlib calls
        # with it, but ccache treats our zig .cmd wrappers as "No such
        # file or directory" and the manifold link fails. Move the binary
        # so CMake stops finding it.
        shell: bash
        run: |
          if [ -f "/c/Strawberry/c/bin/ccache.exe" ]; then
            mv "/c/Strawberry/c/bin/ccache.exe" "/c/Strawberry/c/bin/ccache.exe.disabled"
            echo "Disabled Strawberry Perl ccache"
          fi

      - name: Build manifold
        # USE_TOOLCHAIN=true is forced on Windows by build-manifold.sh.
        # Don't set CC/CXX — CMake on Windows can't handle "zig cc" as a
        # single executable name (treats it as one literal program).
        if: steps.cache-manifold.outputs.cache-hit != 'true'
        shell: bash
        run: make manifold

      - name: Run tests
        # Go's cgo splits CC on whitespace so "zig cc" works here, unlike CMake.
        shell: bash
        run: make test
        env:
          CC: zig cc
          CXX: zig c++

      - name: Add Go toolchain to PATH
        shell: bash
        run: echo "${{ github.workspace }}/.go-toolchain/bin" >> $GITHUB_PATH

      - name: Set up gcc shim for Wails bindings
        # Wails' bindings generator deliberately strips CC and falls back
        # to the default cgo compiler ("gcc" on Windows). Without mingw
        # the lookup fails and cgo gets silently disabled, dropping our
        # cgo-tagged manifold files and breaking the bindings build with
        # 'undefined: Solid'. Shim gcc.cmd / g++.cmd to invoke zig.
        # (This is a Wails/CGO requirement, not a runner-specific one.)
        shell: bash
        run: |
          set -e
          SHIM_DIR="$RUNNER_TEMP/cc-shim"
          mkdir -p "$SHIM_DIR"
          ZIG_EXE=$(cygpath -w "$(command -v zig)")
          cat > "$SHIM_DIR/gcc.cmd" <<EOF
          @echo off
          "$ZIG_EXE" cc %*
          EOF
          cat > "$SHIM_DIR/g++.cmd" <<EOF
          @echo off
          "$ZIG_EXE" c++ %*
          EOF
          echo "$SHIM_DIR" >> $GITHUB_PATH

      - name: Build Facet
        shell: bash
        run: make build
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          CC: zig cc
          CXX: zig c++

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp desktop/build/bin/facet.exe dist/Facet-windows-amd64.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifact
          path: dist/Facet-windows-amd64.exe
          retention-days: 14
          if-no-files-found: error

  build-macos:
    runs-on: macos-14  # arm64 native — no cross-compile needed
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache custom Go toolchain
        id: cache-go
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: .go-toolchain
          key: go-toolchain-macOS-${{ hashFiles('scripts/setup-go.sh') }}

      - name: Build custom Go toolchain
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: bash scripts/setup-go.sh

      - name: Cache manifold + third-party builds
        # See Linux job for rationale.
        id: cache-manifold
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            third_party
            pkg/manifold/cxx/build-*
          key: manifold-${{ runner.os }}-${{ hashFiles('scripts/_third-party-versions.sh', 'scripts/build-manifold.sh', 'pkg/manifold/cxx/CMakeLists.txt', 'pkg/manifold/cxx/include/**', 'pkg/manifold/cxx/src/**') }}

      - name: Build manifold (native arm64)
        if: steps.cache-manifold.outputs.cache-hit != 'true'
        run: make manifold

      - name: Run tests
        run: make test

      - name: Build Facet.app (native arm64)
        # No -platform, no MACOSX_DEPLOYMENT_TARGET, no CGO_LDFLAGS dance.
        # macos-14 is arm64 native; the prior cross-compile machinery
        # existed for x86 self-hosted hardware and is no longer needed.
        #
        # /opt/homebrew/bin is required: the manifold target re-runs the
        # facet_cxx cmake build, and cmake on Apple Silicon runners lives
        # under Homebrew. The Linux job doesn't need this because
        # /usr/bin/cmake is there by default.
        run: make build
        env:
          GOROOT: ${{ github.workspace }}/.go-toolchain
          PATH: ${{ github.workspace }}/.go-toolchain/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/usr/sbin:/bin:/sbin

      - name: Ad-hoc codesign (release.yml will do real signing for main/tag)
        run: codesign -s - --force --deep --options runtime desktop/build/bin/Facet.app

      - name: Tarball Facet.app for release.yml to consume
        # Tarball preserves bundle structure / extended attributes across
        # the upload/download boundary; bare .app upload loses things.
        run: |
          mkdir -p dist
          tar czf dist/Facet-macOS-arm64-app.tar.gz -C desktop/build/bin Facet.app

      - name: Upload unsigned macOS app tarball
        uses: actions/upload-artifact@v7
        with:
          name: macos-app-unsigned
          path: dist/Facet-macOS-arm64-app.tar.gz
          retention-days: 14
          if-no-files-found: error
