<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="face1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="face2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#d4911e"/>
    </linearGradient>
    <linearGradient id="face3" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Faceted gem / crystal shape — three visible faces of a cut gemstone -->
  <!-- Top face (brightest) -->
  <polygon points="512,180 740,380 512,480 284,380" fill="url(#face2)" opacity="0.95"/>
  <!-- Left face -->
  <polygon points="284,380 512,480 512,780 220,520" fill="url(#face1)" opacity="0.9"/>
  <!-- Right face -->
  <polygon points="740,380 512,480 512,780 804,520" fill="url(#face3)" opacity="0.9"/>
  <!-- Edge highlights -->
  <line x1="512" y1="180" x2="284" y2="380" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
  <line x1="512" y1="180" x2="740" y2="380" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
  <line x1="284" y1="380" x2="512" y2="480" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  <line x1="740" y1="380" x2="512" y2="480" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  <line x1="512" y1="480" x2="512" y2="780" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
  <line x1="284" y1="380" x2="220" y2="520" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  <line x1="740" y1="380" x2="804" y2="520" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  <line x1="220" y1="520" x2="512" y2="780" stroke="#ffffff" stroke-width="3" opacity="0.25"/>
  <line x1="804" y1="520" x2="512" y2="780" stroke="#ffffff" stroke-width="3" opacity="0.25"/>
</svg>
